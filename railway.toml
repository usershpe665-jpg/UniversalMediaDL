[build]
builder = "nixpacks"

[deploy]
startCommand = "python app/main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[variables]
PORT = "8080"
DOWNLOAD_DIR = "/app/downloads"
AUDIO_DOWNLOAD_DIR = "/app/downloads"
TEMP_DIR = "/app/downloads"
STATE_DIR = "/app/state"
LOGLEVEL = "INFO"
MAX_CONCURRENT_DOWNLOADS = "3"
FILE_CLEANUP_HOURS = "3"
