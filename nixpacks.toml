[phases.setup]
nixPkgs = ["python311", "ffmpeg"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && pip install -U yt-dlp"
]

[start]
cmd = "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 600"
